<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beads DoltHub Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,300&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
<style>
/* ─────────────────────── Tokens ─────────────────────── */
:root {
  --bg:        oklch(96%  0.011 82);
  --panel:     oklch(98.5% 0.007 82);
  --surface:   oklch(99.5% 0.004 82);
  --border:    oklch(89%  0.013 82);
  --border-2:  oklch(81%  0.017 82);

  --ink:   oklch(15%  0.017 82);
  --ink-2: oklch(34%  0.019 82);
  --ink-3: oklch(54%  0.013 82);
  --ink-4: oklch(70%  0.009 82);

  --accent:     oklch(58%  0.19 75);
  --accent-bg:  oklch(96%  0.04 78);
  --accent-txt: oklch(32%  0.13 75);

  --open:      oklch(49%  0.16 145);
  --open-bg:   oklch(96%  0.06 145);
  --wip:       oklch(52%  0.18 75);
  --wip-bg:    oklch(96%  0.05 75);
  --blocked:   oklch(50%  0.18 28);
  --blocked-bg:oklch(96%  0.05 30);
  --deferred:  oklch(54%  0.08 270);
  --deferred-bg:oklch(96% 0.03 270);
  --done:      oklch(46%  0.09 230);
  --done-bg:   oklch(94%  0.04 230);

  --font-d: 'Fraunces', Georgia, serif;
  --font-b: 'DM Sans', system-ui, sans-serif;
  --font-m: 'IBM Plex Mono', monospace;
  --r: 5px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { color-scheme:light; background:var(--bg); }
body { font-family:var(--font-b); font-size:.9375rem; line-height:1.5;
       color:var(--ink); -webkit-font-smoothing:antialiased;
       overflow:hidden; height:100dvh; display:grid;
       grid-template-rows:48px 1fr; }
button { cursor:pointer; font-family:inherit; }
input  { font-family:inherit; }

/* ─────────────────────── Topbar ─────────────────────── */
.topbar {
  background:var(--panel); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:.875rem; padding:0 1.25rem;
  position:relative; z-index:10;
}
.topbar::after {
  content:''; position:absolute; inset:auto 0 0 0; height:2px;
  background:var(--accent); transform:scaleX(0); transform-origin:left;
  opacity:0; pointer-events:none; border-radius:0 2px 0 0;
}
.topbar.is-loading::after { animation:loadbar 1.1s ease-in-out infinite; opacity:1; }
@keyframes loadbar { 0%{transform:scaleX(0);opacity:1} 70%{transform:scaleX(1);opacity:1} 100%{transform:scaleX(1);opacity:0} }

.brand { font-family:var(--font-d); font-size:1.05rem; font-weight:500;
         letter-spacing:-.02em; white-space:nowrap; flex-shrink:0; }
.brand em { font-style:italic; font-weight:300; color:var(--ink-4); font-size:.88rem; }

.repo-form { display:flex; gap:.35rem; flex:1; max-width:380px; min-width:160px; }
.repo-input {
  flex:1; height:30px; padding:0 .6rem;
  border:1px solid var(--border); border-radius:var(--r);
  background:var(--bg); color:var(--ink); font-size:.8rem; font-family:var(--font-m);
  outline:none; transition:border-color 100ms; min-width:0;
}
.repo-input:focus { border-color:var(--accent); }
.repo-input::placeholder { font-family:var(--font-b); font-style:italic; color:var(--ink-4); }
.btn {
  height:30px; padding:0 .875rem; border-radius:var(--r); border:none;
  font-size:.78rem; font-weight:500; white-space:nowrap;
  background:var(--accent); color:#fff; transition:filter 100ms;
}
.btn:hover:not(:disabled) { filter:brightness(1.1); }
.btn:disabled { opacity:.35; cursor:not-allowed; }

.tb-right { margin-left:auto; display:flex; align-items:center; gap:.875rem; flex-shrink:0; }
.tb-meta  { font-size:.72rem; color:var(--ink-3); font-family:var(--font-m); }
.refresh-ring { display:inline-flex; align-items:center; gap:.3rem; }
.refresh-ring svg { display:block; }
.ring-track { stroke:var(--border); fill:none; }
.ring-fill  { fill:none; stroke:var(--accent); stroke-linecap:round;
              transition:stroke-dashoffset 1s linear; transform-origin:center; transform:rotate(-90deg); }
.rlabel { font-size:.67rem; font-family:var(--font-m); color:var(--ink-4); }
.tb-link { font-size:.74rem; color:var(--ink-3); text-decoration:none; }
.tb-link:hover { color:var(--accent-txt); }

/* ─────────────────────── Main layout ─────────────────── */
.layout { display:grid; grid-template-columns:200px 1fr; height:100%; overflow:hidden; }

/* ─────────────────────── Sidebar ─────────────────────── */
.sidebar {
  background:var(--panel); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow-y:auto; overflow-x:hidden;
}
.sidebar::-webkit-scrollbar { width:3px; }
.sidebar::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
.sb-sec { padding:.75rem .875rem; border-bottom:1px solid var(--border); }
.sb-lbl {
  font-size:.6rem; font-weight:500; text-transform:uppercase; letter-spacing:.1em;
  color:var(--ink-4); font-family:var(--font-m); margin-bottom:.45rem;
}

/* Progress */
.progress-bar { height:3px; background:var(--border); border-radius:99px; overflow:hidden; margin:.4rem 0 .6rem; }
.progress-fill { height:100%; background:var(--done); border-radius:99px; transition:width .5s; }
.stat-rows { display:flex; flex-direction:column; gap:2px; }
.stat-row {
  display:flex; align-items:center; gap:.45rem;
  font-size:.8rem; color:var(--ink-2); padding:.25rem .35rem; border-radius:var(--r);
  cursor:pointer; transition:background 80ms; user-select:none;
}
.stat-row:hover { background:var(--bg); }
.stat-row.active { background:var(--accent-bg); color:var(--accent-txt); }
.sdot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.sdot.all      { background:var(--ink-3); }
.sdot.open     { background:var(--open); }
.sdot.wip      { background:var(--wip); }
.sdot.blocked  { background:var(--blocked); }
.sdot.deferred { background:var(--deferred); }
.sdot.done     { background:var(--done); }
.scount { margin-left:auto; font-family:var(--font-m); font-size:.68rem; color:var(--ink-4); }
.stat-row.active .scount { color:var(--accent-txt); }

/* Views nav */
.view-nav { display:flex; flex-direction:column; gap:1px; }
.vnav-btn {
  display:flex; align-items:center; gap:.55rem;
  padding:.42rem .625rem; border-radius:var(--r);
  font-size:.8rem; color:var(--ink-3); background:none; border:none;
  text-align:left; width:100%; transition:background 80ms, color 80ms;
}
.vnav-btn:hover { background:var(--bg); color:var(--ink); }
.vnav-btn.active { background:var(--accent-bg); color:var(--accent-txt); font-weight:500; }
.vicon { font-size:.78rem; width:14px; text-align:center; flex-shrink:0; opacity:.7; }

/* Team list */
.team-list { display:flex; flex-direction:column; gap:2px; }
.person-btn {
  display:flex; align-items:center; gap:.55rem;
  padding:.35rem .45rem; border-radius:var(--r);
  cursor:pointer; border:none; background:none; text-align:left; width:100%;
  transition:background 80ms;
}
.person-btn:hover { background:var(--bg); }
.person-btn.active { background:var(--accent-bg); }

.av {
  width:22px; height:22px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:.55rem; font-weight:700; color:#fff; letter-spacing:0;
}
.pname { font-size:.78rem; color:var(--ink-2); flex:1; min-width:0;
         white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.person-btn.active .pname { color:var(--accent-txt); }
.pcnt  { font-family:var(--font-m); font-size:.65rem; color:var(--ink-4); }
.pocnt { color:var(--open); font-family:var(--font-m); font-size:.65rem; }

/* Column toggles */
.col-toggles { display:flex; flex-direction:column; gap:2px; }
.ctog-chip {
  display:flex; align-items:center; gap:.45rem;
  padding:.3rem .45rem; border-radius:var(--r);
  font-size:.78rem; color:var(--ink-3); background:none; border:none;
  text-align:left; width:100%; cursor:pointer; transition:background 80ms, color 80ms;
  user-select:none;
}
.ctog-chip:hover { background:var(--bg); color:var(--ink-2); }
.ctog-chip.on  { color:var(--ink-2); }
.ctog-chip.off { opacity:.45; }
.ctog-icon { font-size:.65rem; width:14px; text-align:center; font-family:var(--font-m); }

/* ─────────────────────── Content ─────────────────────── */
.content { display:flex; flex-direction:column; overflow:hidden; }

.warn-bar {
  background:oklch(96% .05 65); border-bottom:1px solid oklch(88% .07 65);
  padding:.3rem 1rem; font-size:.71rem; color:oklch(36% .13 58);
  display:none; flex-wrap:wrap; gap:.25rem .75rem; flex-shrink:0;
}
.warn-bar.vis { display:flex; }

/* ─────────── SWIMLANE KANBAN ─────────── */
.kanban-wrap { display:flex; flex-direction:column; flex:1; overflow:hidden; }

/* Fixed column header row */
.kanban-header {
  display:grid;
  grid-template-columns: 150px 1fr 1fr 1fr 1fr;
  border-bottom:2px solid var(--border);
  background:var(--panel);
  flex-shrink:0;
}
.kh-person-cell {
  padding:.5rem .75rem;
  border-right:1px solid var(--border);
  font-size:.62rem; font-weight:500; text-transform:uppercase;
  letter-spacing:.09em; color:var(--ink-4); font-family:var(--font-m);
  display:flex; align-items:center;
}
.kh-status-cell {
  padding:.5rem .75rem;
  border-right:1px solid var(--border);
  display:flex; align-items:center; gap:.4rem;
}
.kh-status-cell:last-child { border-right:none; }
.kh-status-title { font-size:.65rem; font-weight:500; text-transform:uppercase; letter-spacing:.07em; }
.kh-status-title.open     { color:var(--open); }
.kh-status-title.wip      { color:var(--wip); }
.kh-status-title.blocked  { color:var(--blocked); }
.kh-status-title.deferred { color:var(--deferred); }
.kh-status-title.done     { color:var(--done); }
.kh-count { font-family:var(--font-m); font-size:.62rem; color:var(--ink-4);
            background:var(--bg); border:1px solid var(--border);
            border-radius:99px; padding:.05em .4em; }

/* Scrollable swimlane body */
.kanban-body { flex:1; overflow-y:auto; overflow-x:hidden; }
.kanban-body::-webkit-scrollbar { width:3px; }
.kanban-body::-webkit-scrollbar-thumb { background:var(--border-2); border-radius:99px; }

/* Each swimlane row */
.swim-row {
  display:grid;
  grid-template-columns:150px 1fr 1fr 1fr 1fr;
  border-bottom:1px solid var(--border);
  min-height:64px;
}
.swim-row:last-child { border-bottom:none; }

/* Person label cell */
.swim-person {
  border-right:1px solid var(--border);
  padding:.625rem .75rem;
  display:flex; align-items:flex-start; gap:.5rem;
  background:var(--panel);
  position:sticky; left:0;
}
.swim-person-info { flex:1; min-width:0; }
.swim-pname { font-size:.8rem; font-weight:500; color:var(--ink); line-height:1.3;
              white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.swim-pstats { font-size:.65rem; font-family:var(--font-m); color:var(--ink-4); margin-top:.15rem; }
.swim-open-count { color:var(--open); font-weight:500; }

/* Task cells */
.swim-cell {
  border-right:1px solid var(--border);
  padding:.5rem .625rem;
  display:flex; flex-wrap:wrap; gap:.375rem; align-content:flex-start;
  max-height:200px; overflow-y:auto; overflow-x:hidden;
  transition:max-height .18s ease;
}
.swim-cell::-webkit-scrollbar { width:3px; }
.swim-cell::-webkit-scrollbar-thumb { background:var(--border-2); border-radius:99px; }
.swim-cell:last-child { border-right:none; }
/* Collapsed row: shrinks all cells to zero height */
.swim-row.row-collapsed .swim-cell { max-height:0; padding-top:0; padding-bottom:0; overflow:hidden; }
.swim-row.row-collapsed .swim-empty { display:none; }

/* Row expand toggle */
.row-toggle {
  background:none; border:none; cursor:pointer; padding:.1rem .15rem;
  color:var(--ink-4); font-size:.58rem; line-height:1; margin-left:auto;
  border-radius:3px; transition:background 80ms, color 80ms, transform .15s;
  flex-shrink:0; align-self:flex-start; margin-top:2px;
}
.row-toggle:hover { background:var(--bg); color:var(--ink-2); }
.swim-row.row-collapsed .row-toggle { transform:rotate(-90deg); }

/* Hover-expand: on row hover, cells grow taller so you can scroll more */
.kanban-body:not(:has(.swim-row:hover)) .swim-row:hover .swim-cell,
.swim-row:hover .swim-cell { max-height:320px; }
.swim-row.row-collapsed:hover .swim-cell { max-height:0; }

/* Empty column visual: dimmer border and narrow min-width */
.swim-cell.col-empty { background: transparent; }
.swim-cell.col-empty .swim-empty { color:var(--ink-4); opacity:.4; font-size:.67rem; }

/* "+ N more" overflow badge */
.more-badge {
  display:inline-flex; align-items:center;
  font-size:.6rem; font-family:var(--font-m);
  color:var(--ink-4); background:var(--bg);
  border:1px solid var(--border); border-radius:var(--r);
  padding:.1em .5em; width:100%; justify-content:center;
  cursor:pointer; margin-top:.1rem;
  transition:background 80ms, color 80ms;
}
.more-badge:hover { background:var(--accent-bg); color:var(--accent-txt); border-color:var(--accent); }

/* ─── Mini task card ─── */
.task-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-left:3px solid var(--border-2);
  border-radius:var(--r);
  padding:.45rem .55rem;
  width:100%;
  cursor:pointer;
  transition:box-shadow 100ms, border-color 100ms;
  position:relative;
}
.task-card:hover { box-shadow:0 2px 10px oklch(0% 0 0 / .06); border-color:var(--border-2); }
.task-card.status-open        { border-left-color:var(--open); }
.task-card.status-in_progress { border-left-color:var(--wip); background:oklch(99.5% 0.016 75); }
.task-card.status-blocked     { border-left-color:var(--blocked); }
.task-card.status-deferred    { border-left-color:var(--deferred); opacity:.8; }
.task-card.status-closed      { border-left-color:var(--done); opacity:.68; }

.card-title { font-size:.8125rem; font-weight:500; line-height:1.35; color:var(--ink); word-break:break-word; }
.task-card.status-in_progress .card-title { font-weight:600; }
.task-card.status-closed .card-title { text-decoration:line-through; color:var(--ink-3); text-decoration-color:var(--ink-4); }
.task-card.status-deferred .card-title { color:var(--ink-3); }
.card-id   { font-family:var(--font-m); font-size:.6rem; color:var(--ink-4); margin-top:.1rem; }

.card-badges { display:flex; flex-wrap:wrap; gap:.2rem; margin-top:.35rem; align-items:center; }
.badge {
  display:inline-flex; align-items:center;
  padding:.08em .38em; border-radius:2px;
  font-size:.58rem; font-weight:500; letter-spacing:.04em; text-transform:uppercase;
  white-space:nowrap;
}
.b-open     { background:var(--open-bg);     color:var(--open); }
.b-wip      { background:var(--wip-bg);      color:var(--wip); }
.b-blocked  { background:var(--blocked-bg);  color:var(--blocked); }
.b-deferred { background:var(--deferred-bg); color:var(--deferred); }
.b-done     { background:var(--done-bg);     color:var(--done); }
.b-p0   { background:oklch(95% .06 28); color:oklch(36% .18 28); }
.b-p1   { background:oklch(96% .04 60); color:oklch(40% .15 60); }
.b-p2   { background:var(--bg); color:var(--ink-3); border:1px solid var(--border); }
.b-type { background:var(--bg); color:var(--ink-4); border:1px solid var(--border); }

.card-deps { display:flex; flex-wrap:wrap; gap:.2rem; align-items:center; margin-top:.3rem; }
.dep-label { font-size:.58rem; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-4); }
.dep-chip  {
  font-family:var(--font-m); font-size:.58rem;
  background:var(--bg); border:1px solid var(--border); border-radius:2px;
  padding:.03em .3em; color:var(--ink-3);
}

/* Description (toggle on click) */
.card-desc { font-size:.75rem; color:var(--ink-2); line-height:1.45;
             margin-top:.35rem; display:none; }
.card-desc.open { display:block; }

/* Empty cell placeholder */
.swim-empty { font-size:.72rem; color:var(--ink-4); padding:.5rem .25rem;
              font-style:italic; align-self:center; }

/* ─────────── OTHER VIEWS (Tree / Grouped / Person) ─────────── */
.scroll-view {
  flex:1; overflow-y:auto; padding:.875rem 1.125rem;
  display:flex; flex-direction:column; gap:.625rem;
}
.scroll-view::-webkit-scrollbar { width:3px; }
.scroll-view::-webkit-scrollbar-thumb { background:var(--border-2); border-radius:99px; }

/* Board (flat two-col layout for dep/group view cards) */
.board { display:grid; grid-template-columns:1fr 1fr; gap:0; flex:1; overflow:hidden; }
.col { display:flex; flex-direction:column; border-right:1px solid var(--border); overflow:hidden; }
.col:last-child { border-right:none; }
.col-header {
  display:flex; align-items:center; gap:.5rem; padding:.55rem .875rem;
  border-bottom:1px solid var(--border); background:var(--panel); flex-shrink:0;
}
.col-title { font-size:.67rem; font-weight:500; text-transform:uppercase; letter-spacing:.07em; color:var(--ink-3); }
.col-count { font-family:var(--font-m); font-size:.62rem; color:var(--ink-4);
             background:var(--bg); border:1px solid var(--border); border-radius:99px; padding:.04em .4em; }
.col-body { flex:1; overflow-y:auto; padding:.625rem .75rem; display:flex; flex-direction:column; gap:.375rem; }
.col-body::-webkit-scrollbar { width:3px; }
.col-body::-webkit-scrollbar-thumb { background:var(--border-2); border-radius:99px; }

/* Tree */
.tree-children { margin-left:1.25rem; padding-left:.875rem; border-left:2px solid var(--border);
                 margin-top:.35rem; display:flex; flex-direction:column; gap:.35rem; }
.tree-children.collapsed { display:none; }
.ref-node { display:flex; align-items:center; gap:.4rem; padding:.3rem .6rem;
            background:var(--bg); border:1px dashed var(--border); border-radius:var(--r);
            font-size:.73rem; color:var(--ink-3); }
.ref-id { font-family:var(--font-m); font-size:.6rem; color:var(--ink-4); }
.ctog { flex-shrink:0; width:16px; height:16px; background:none; border:none;
        color:var(--ink-4); font-size:.5rem; display:flex; align-items:center;
        justify-content:center; transition:transform 100ms; padding:0; margin-top:2px; }
.ctog.open { transform:rotate(90deg); }

/* Group */
.group-section { display:flex; flex-direction:column; gap:.35rem; }
.group-header { display:flex; align-items:center; gap:.55rem; padding:.35rem 0;
                border-bottom:2px solid var(--border); cursor:pointer; user-select:none; }
.group-title { font-family:var(--font-d); font-size:.92rem; font-weight:500; color:var(--ink); transition:color 100ms; }
.group-header:hover .group-title { color:var(--accent-txt); }
.group-count { font-family:var(--font-m); font-size:.63rem; color:var(--ink-4);
               background:var(--bg); border:1px solid var(--border); border-radius:99px; padding:.04em .4em; }
.gchev { margin-left:auto; color:var(--ink-4); font-size:.58rem; transition:transform 100ms; }
.gchev.open { transform:rotate(180deg); }
.group-body { display:flex; flex-direction:column; gap:.35rem; }
.group-body.collapsed { display:none; }

/* Per-person section (person view) */
.person-section { display:flex; flex-direction:column; gap:.375rem; }
.ps-header { display:flex; align-items:center; gap:.625rem; padding-bottom:.45rem;
             border-bottom:2px solid var(--border); }
.ps-name { font-family:var(--font-d); font-size:1rem; font-weight:500; color:var(--ink); }
.ps-stats { font-size:.7rem; font-family:var(--font-m); color:var(--ink-3); }
.ps-tasks { display:flex; flex-direction:column; gap:.35rem; }

/* Empty/error states */
.state-panel { display:flex; flex-direction:column; gap:.5rem; padding:2.5rem 1.5rem; }
.state-icon  { font-size:1.75rem; line-height:1; }
.state-title { font-family:var(--font-d); font-size:1.25rem; font-weight:500; color:var(--ink); letter-spacing:-.02em; }
.state-body  { font-size:.875rem; color:var(--ink-2); line-height:1.5; max-width:380px; }
.state-hint  { font-size:.74rem; font-family:var(--font-m); color:var(--ink-4); }
</style>
</head>
<body>

<!-- ── Topbar ── -->
<header class="topbar" id="topbar">
  <span class="brand">Beads <em>Viewer</em></span>
  <form class="repo-form" onsubmit="handleLoad(event)">
    <input class="repo-input" id="repo-input" type="text"
      placeholder="owner/repo" autocomplete="off" spellcheck="false"
      oninput="updateLoadBtn()" />
    <button class="btn" id="load-btn" type="submit" disabled>Load</button>
  </form>
  <div class="tb-right">
    <div class="tb-meta" id="tb-meta" style="display:none"><span id="tb-repo"></span></div>
    <div class="refresh-ring" id="rring" style="display:none" title="Auto-refresh every 5s">
      <svg width="16" height="16" viewBox="0 0 16 16">

<script>
/* ── Constants ── */
const STORAGE_KEY = 'beads-viewer:last-repo';
const REFRESH_SEC = 5;
const API_BASE    = 'https://www.dolthub.com/api/v1alpha1';
const HUB_BASE    = 'https://www.dolthub.com/repositories';
const CIRC        = 2 * Math.PI * 6;
const MAX_DESC    = 200;

const AV_COLORS = [
  'oklch(50% .19 76)','oklch(46% .16 145)','oklch(47% .15 230)',
  'oklch(50% .17 310)','oklch(49% .19 28)','oklch(46% .15 190)',
  'oklch(50% .16 55)','oklch(48% .14 270)',
];
function avColor(name) {
  let h=0; for(let i=0;i<name.length;i++) h=(Math.imul(31,h)+name.charCodeAt(i))|0;
  return AV_COLORS[Math.abs(h)%AV_COLORS.length];
}
function initials(name) {
  return (name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase()||'?';
}

let state = {
  repo:null, records:[], warnings:[], depTree:null, groupedTree:null,
  view:'kanban', statusFilter:'all', personFilter:null,
  visibleCols: new Set(['open','in_progress','blocked','deferred','closed']),
};
let timer=null, countdown=REFRESH_SEC;

/* ── Boot ── */
(function boot(){
  updateLoadBtn();
  const {repo} = readLastRepo();
  if (repo) { document.getElementById('repo-input').value=repo.rawInput; updateLoadBtn(); loadRepo(repo.canonicalRepo,false); }
})();

/* ── Normalization ── */
function normalizeRepo(raw) {
  const s=(raw||'').trim(); if(!s) throw new Error('Required');
  if(s.startsWith('http')) {
    let u; try{u=new URL(s)}catch{throw new Error('Bad URL');}
    if(!['www.dolthub.com','dolthub.com'].includes(u.hostname)) throw new Error('Not DoltHub URL');
    const p=u.pathname.replace(/^\/+|\/+$/g,'').split('/');
    if(p.length!==3||p[0]!=='repositories') throw new Error('Bad URL path');
    return cfg(raw,p[1],p[2]);
  }
  const p=s.split('/');
  if(p.length===2&&p[0]&&p[1]) return cfg(raw,p[0],p[1]);
  throw new Error('Use owner/repo or full DoltHub URL');
}
function cfg(rawInput,owner,repoName) {
  return {rawInput,owner,repoName,canonicalRepo:`${owner}/${repoName}`,sourceUrl:`${HUB_BASE}/${owner}/${repoName}`};
}

/* ── LocalStorage ── */
function readLastRepo() {
  try {
    const r=localStorage.getItem(STORAGE_KEY); if(!r) return {repo:null};
    const o=JSON.parse(r);
    if(!o?.rawInput||!o?.canonicalRepo) { localStorage.removeItem(STORAGE_KEY); return {repo:null}; }
    return {repo:o};
  } catch { localStorage.removeItem(STORAGE_KEY); return {repo:null}; }
}
function writeLastRepo(r) { localStorage.setItem(STORAGE_KEY,JSON.stringify({rawInput:r.rawInput,canonicalRepo:r.canonicalRepo,sourceUrl:r.sourceUrl})); }

/* ── DoltHub Client ── */
async function sqlQ(owner,repo,q) {
  const r=await fetch(`${API_BASE}/${owner}/${repo}?q=${encodeURIComponent(q)}`).catch(e=>{throw{kind:'fetch',msg:e.message};});
  if(!r.ok) throw{kind:'fetch',msg:`HTTP ${r.status}`};
  const b=await r.json().catch(()=>{throw{kind:'fetch',msg:'Bad JSON'};});
  if(b.query_execution_status!=='Success') throw{kind:'query',msg:b.query_execution_message||'Query failed'};
  return b.rows||[];
}
async function fetchData(owner,repo) {
  const tables=(await sqlQ(owner,repo,'SHOW TABLES')).map(r=>Object.values(r)[0]);
  if(!tables.includes('issues')||!tables.includes('dependencies'))
    throw{kind:'schema',msg:`Missing tables. Found: ${tables.join(', ')||'none'}`};
  const issues=await sqlQ(owner,repo,'SELECT id,title,description,status,priority,issue_type,assignee,metadata FROM issues');
  const deps  =await sqlQ(owner,repo,'SELECT issue_id,depends_on_id,type,metadata FROM dependencies');
  return {issues,deps};
}

/* ── Adapter ── */
function parseMeta(raw) {
  if(!raw) return {};
  if(typeof raw==='object'&&!Array.isArray(raw)) return raw;
  if(typeof raw==='string'){try{const p=JSON.parse(raw);if(p&&typeof p==='object'&&!Array.isArray(p))return p;}catch{}}
  return {};
}
function adapt({issues,deps}) {
  const warns=[]; const map=new Map();
  for(const r of issues){
    const m=parseMeta(r.metadata);
    map.set(r.id,{id:r.id,title:r.title||'(no title)',status:(r.status||'').toLowerCase(),
      priority:r.priority??null,type:r.issue_type||'',assignee:r.assignee||'',
      description:r.description||'',parentId:m.parent_id||null,groupId:m.group_id||null,
      groupLabel:m.group_label||null,dependsOnIds:[],blocksCount:0,raw:r});
  }
  const wc=new Map(); const aw=msg=>wc.set(msg,(wc.get(msg)||0)+1);
  for(const d of deps){
    if(d.type==='parent-child'||d.type==='parentchild'){
      const c=map.get(d.issue_id); if(c&&d.depends_on_id&&!c.parentId)c.parentId=d.depends_on_id; continue;
    }
    if(d.type!=='blocks'){aw(`Dep type "${d.type}" ignored`);continue;}
    const rec=map.get(d.issue_id); if(!rec){aw(`Unknown "${d.issue_id}"`);continue;}
    if(!rec.dependsOnIds.includes(d.depends_on_id))rec.dependsOnIds.push(d.depends_on_id);
    const bl=map.get(d.depends_on_id); if(bl)bl.blocksCount++; else aw(`Missing dep target "${d.depends_on_id}"`);
  }
  for(const[msg,n]of wc)warns.push(n>1?`${msg} ×${n}`:msg);
  return{records:[...map.values()],warnings:warns};
}

/* ── Tree builders ── */
function buildDepTree(records) {
  const byId=new Map(records.map(r=>[r.id,r]));
  const down=new Map(records.map(r=>[r.id,[]]));
  for(const r of records)for(const id of r.dependsOnIds)if(down.has(id))down.get(id).push(r.id);
  const roots=records.filter(r=>r.dependsOnIds.filter(id=>byId.has(id)).length===0).map(r=>r.id).sort();
  const seen=new Set();const tw=[];
  function node(id,stack){
    const rec=byId.get(id);if(!rec)return null;
    if(stack.includes(id)){tw.push(`Cycle: ${id}`);return{type:'cycle',id,rec};}
    if(seen.has(id))return{type:'ref',id,rec};
    seen.add(id);
    const ch=(down.get(id)||[]).sort().map(c=>node(c,[...stack,id])).filter(Boolean);
    return{type:'full',id,rec,children:ch};
  }
  const proc=new Set();function mark(n){if(!n)return;proc.add(n.id);(n.children||[]).forEach(mark);}
  const treeRoots=roots.map(id=>{const n=node(id,[]);mark(n);return n;}).filter(Boolean);
  for(const id of [...byId.keys()].sort())if(!proc.has(id)){const n=node(id,[]);mark(n);if(n)treeRoots.push(n);}
  return{roots:treeRoots,warnings:tw};
}
function buildGroupedTree(records) {
  const byId=new Map(records.map(r=>[r.id,r]));
  const secs=new Map();const nw=new Map();
  const getS=(k,t)=>{if(!secs.has(k))secs.set(k,{key:k,title:t,nodes:[]});return secs.get(k);};
  const getW=id=>{if(!nw.has(id))nw.set(id,[]);return nw.get(id);};
  for(const r of records){
    if(r.groupId)getS(`g:${r.groupId}`,r.groupLabel||r.groupId).nodes.push(r);
    else if(r.parentId){const p=byId.get(r.parentId);getS(`p:${r.parentId}`,p?p.title:r.parentId).nodes.push(r);}
    else getS('ug','Ungrouped').nodes.push(r);
  }
  for(const sec of secs.values()){
    const ids=new Set(sec.nodes.map(n=>n.id));
    for(const r of sec.nodes)if(r.parentId&&!ids.has(r.parentId))getW(r.id).push({code:byId.has(r.parentId)?'cross_section':'missing_parent'});
  }
  const list=[...secs.values()].sort((a,b)=>a.key==='ug'?1:b.key==='ug'?-1:a.title.localeCompare(b.title));
  return{sections:list,nodeWarns:nw};
}

/* ── Load ── */
async function loadRepo(rawInput,persist=true) {
  let cfg;
  try{cfg=normalizeRepo(rawInput);}catch(e){showErr('Invalid input',e.message);return;}
  const sv=state.view,sf=state.statusFilter,sp=state.personFilter;
  setLoading(true,cfg); stopTimer();
  try{
    const {issues,deps}=await fetchData(cfg.owner,cfg.repoName);
    const {records,warnings}=adapt({issues,deps});
    state={...state,repo:cfg,records,warnings,depTree:buildDepTree(records),groupedTree:buildGroupedTree(records),
            view:sv,statusFilter:sf,personFilter:sp};
    if(persist)writeLastRepo(cfg);
    setLoading(false); renderAll(); startTimer();
  }catch(err){
    setLoading(false);
    const e=err instanceof Error?{kind:'fetch',msg:err.message}:(err||{kind:'fetch',msg:'Unknown'});
    showErr({fetch:'Fetch failed',query:'Query failed',schema:'Unsupported schema'}[e.kind]||'Error',e.msg);
  }
}

/* ── Timer ── */
function startTimer(){
  stopTimer(); countdown=REFRESH_SEC; updateRing();
  document.getElementById('rring').style.display='inline-flex';
  timer=setInterval(()=>{
    countdown--;updateRing();
    if(countdown<=0){stopTimer();if(state.repo)loadRepo(state.repo.canonicalRepo,false);}
  },1000);
}
function stopTimer(){ if(timer){clearInterval(timer);timer=null;} document.getElementById('rring').style.display='none'; }
function updateRing(){
  const f=document.getElementById('ring-fill'),l=document.getElementById('rlabel');
  if(!f||!l)return;
  f.style.strokeDashoffset=CIRC*(1-countdown/REFRESH_SEC);
  l.textContent=`${countdown}s`;
}

/* ── UI interactions ── */
function handleLoad(e){e.preventDefault();const v=(document.getElementById('repo-input').value||'').trim();if(v)loadRepo(v,true);}
function updateLoadBtn(){document.getElementById('load-btn').disabled=!(document.getElementById('repo-input').value||'').trim();}
function setLoading(on,cfg){
  document.getElementById('topbar').classList.toggle('is-loading',on);
  if(on&&cfg){document.getElementById('tb-repo').textContent=cfg.canonicalRepo;document.getElementById('tb-meta').style.display='block';}
}
function setStatusFilter(f){
  state.statusFilter=f;state.personFilter=null;
  document.querySelectorAll('.stat-row').forEach(el=>el.classList.remove('active'));
  document.getElementById(`fr-${f}`)?.classList.add('active');
  document.querySelectorAll('.person-btn').forEach(el=>el.classList.remove('active'));
  renderContent();
}
function setPersonFilter(name){
  state.personFilter=state.personFilter===name?null:name;
  state.statusFilter='all';
  document.querySelectorAll('.stat-row').forEach(el=>el.classList.remove('active'));
  document.getElementById('fr-all')?.classList.add('active');
  document.querySelectorAll('.person-btn').forEach(el=>el.classList.remove('active'));
  if(state.personFilter!=null)document.querySelector(`.person-btn[data-name="${CSS.escape(name)}"]`)?.classList.add('active');
  renderContent();
}
function setView(v){
  state.view=v;
  ['kanban','person','dep','group'].forEach(k=>document.getElementById(`vb-${k}`)?.classList.toggle('active',k===v));
  // Show the Columns panel only in Kanban view
  const $sc=document.getElementById('sb-cols');
  if($sc)$sc.style.display=v==='kanban'&&state.records.length?'block':'none';
  renderContent();
}

/* ── Render all ── */
function renderAll(){renderSidebar();renderContent();}
/* ── Column visibility ── */
function toggleCol(col){
  if(state.visibleCols.has(col)){
    if(state.visibleCols.size<=1)return; // keep at least one
    state.visibleCols.delete(col);
  } else {
    state.visibleCols.add(col);
  }
  // Update chip states
  ['open','in_progress','blocked','deferred','closed'].forEach(c=>{
    const btn=document.getElementById(`ctb-${c}`);
    const ico=document.getElementById(`cti-${c}`);
    const on=state.visibleCols.has(c);
    if(btn){btn.classList.toggle('on',on);btn.classList.toggle('off',!on);}
    if(ico)ico.textContent=on?'✓':'○';
  });
  if(state.view==='kanban')renderContent();
}

function renderSidebar(){
  const recs=state.records;
  const c = st => recs.filter(r=>r.status===st).length;
  const open=c('open'), wip=c('in_progress'), blocked=c('blocked'), deferred=c('deferred'), done=c('closed');
  const total=recs.length;

  document.getElementById('sb-progress').style.display=total?'block':'none';
  document.getElementById('cnt-all').textContent=total;
  document.getElementById('cnt-open').textContent=open;
  document.getElementById('cnt-wip').textContent=wip;
  document.getElementById('cnt-blocked').textContent=blocked;
  document.getElementById('cnt-deferred').textContent=deferred;
  document.getElementById('cnt-done').textContent=done;
  document.getElementById('prog-fill').style.width=total?`${((done+wip)/total*100).toFixed(1)}%`:'0%';
  document.getElementById('tb-repo').textContent=state.repo?.canonicalRepo||'';
  document.getElementById('tb-meta').style.display=state.repo?'block':'none';
  // Columns panel: only in kanban view when data is loaded
  const $sc=document.getElementById('sb-cols');
  if($sc)$sc.style.display=(state.view==='kanban'&&total)?'block':'none';

  // Team
  const amap=new Map();
  for(const r of recs){
    const a=r.assignee?.trim()||'';
    if(!amap.has(a))amap.set(a,{open:0,wip:0,total:0});
    amap.get(a).total++;
    if(r.status==='open')amap.get(a).open++;
    if(r.status==='in_progress')amap.get(a).wip++;
  }
  const sorted=[...amap.entries()].sort((a,b)=>(!a[0]?1:!b[0]?-1:(b[1].wip+b[1].open)-(a[1].wip+a[1].open)||a[0].localeCompare(b[0])));
  const $team=document.getElementById('sb-team');
  const $list=document.getElementById('team-list');
  $team.style.display=sorted.length?'block':'none';
  $list.innerHTML=sorted.map(([name,c])=>{
    const disp=name||'Unassigned';
    const color=name?avColor(name):'var(--ink-4)';
    const act=state.personFilter===name?'active':'';
    return `<button class="person-btn ${act}" data-name="${esc(name)}" onclick="setPersonFilter(${JSON.stringify(name)})">
      <div class="av" style="background:${color}">${esc(initials(disp))}</div>
      <span class="pname">${esc(disp)}</span>
      <span class="pocnt">${c.open}</span><span style="font-size:.6rem;color:var(--ink-4)">/</span><span class="pcnt">${c.total}</span>
    </button>`;
  }).join('');
}

/* ── Filtered records ── */
function filtered(){
  let recs=state.records;
  if(state.personFilter!=null)recs=recs.filter(r=>(r.assignee?.trim()||'')===state.personFilter);
  if(state.statusFilter!=='all')recs=recs.filter(r=>r.status===state.statusFilter);
  return recs;
}

/* ── Content ── */
function renderContent(){
  const $ca=document.getElementById('content-area');

  // Warnings
  const $wb=document.getElementById('warn-bar');
  const allW=[...(state.depTree?.warnings||[]),...state.warnings];
  if(allW.length){$wb.innerHTML=allW.map(w=>`<span>⚠ ${esc(w)}</span>`).join('');$wb.classList.add('vis');}
  else $wb.classList.remove('vis');

  $ca.innerHTML='';
  $ca.style.cssText='display:flex;flex-direction:column;flex:1;overflow:hidden;';

  const v=state.view;
  if(v==='kanban')     renderKanban($ca);
  else if(v==='person')renderByPerson($ca);
  else if(v==='dep')   renderDepView($ca);
  else if(v==='group') renderGroupView($ca);
}

/* ══════════════════════════════════════
   SWIMLANE KANBAN
══════════════════════════════════════ */
function renderKanban($ca) {
  const recs = filtered();

  // Status badge color
  const stColor = {
    open:'b-open', in_progress:'b-wip', blocked:'b-blocked', deferred:'b-deferred', closed:'b-done'
  };
  const stLabel = {
    open:'Open', in_progress:'In Progress', blocked:'Blocked', deferred:'Deferred', closed:'Done'
  };
  // Group by assignee
  const amap = new Map();
  for (const r of recs) {
    const a = r.assignee?.trim() || '';
    if (!amap.has(a)) amap.set(a, {open:[], wip:[], blocked:[], deferred:[], closed:[]});
    const s = r.status==='in_progress'?'wip':
              r.status==='blocked'?'blocked':
              r.status==='deferred'?'deferred':
              r.status==='closed'?'closed':'open';
    amap.get(a)[s].push(r);
  }
  // Sort: most active (open+wip) first, unassigned last
  const sorted = [...amap.entries()].sort((a,b) =>
    !a[0] ? 1 : !b[0] ? -1 :
    (b[1].wip.length + b[1].open.length) - (a[1].wip.length + a[1].open.length) ||
    a[0].localeCompare(b[0])
  );

  const byPri = arr => [...arr].sort((a,b)=>(a.priority??99)-(b.priority??99)||a.title.localeCompare(b.title));

  const cnt = st => recs.filter(r => {
    if (st==='wip') return r.status==='in_progress';
    if (st==='done') return r.status==='closed';
    return r.status===st;
  }).length;

  // Columns config — filter by visibleCols
  const ALL_COLS = [
    {key:'open',        bucket:'open',    label:'● Open',        cls:'open',     bg:null},
    {key:'in_progress', bucket:'wip',     label:'▶ In Progress', cls:'wip',      bg:'oklch(98.5% 0.025 75 / 0.5)'},
    {key:'blocked',     bucket:'blocked', label:'⊘ Blocked',     cls:'blocked',  bg:'oklch(98.5% 0.025 28 / 0.4)'},
    {key:'deferred',    bucket:'deferred',label:'⊡ Deferred',    cls:'deferred', bg:'oklch(98.5% 0.015 270 / 0.4)'},
    {key:'closed',      bucket:'closed',  label:'✓ Done',        cls:'done',     bg:'oklch(98.5% 0.013 230 / 0.5)'},
  ];
  const cols = ALL_COLS.filter(c => state.visibleCols.has(c.key));

  // Determine which columns have zero tasks across ALL persons (globally empty)
  const colCounts = {};
  for (const col of cols) colCounts[col.key] = recs.filter(r => r.status===col.key).length;
  const gridTpl = '150px ' + cols.map(c => colCounts[c.key]===0 ? 'minmax(60px,0.35fr)' : '1fr').join(' ');

  const $wrap = dl('kanban-wrap');

  // Dynamic header
  const $hdr = dl('kanban-header');
  $hdr.style.gridTemplateColumns = gridTpl;
  let hdrHtml = '<div class="kh-person-cell">Person</div>';
  for (const col of cols) {
    const cntVal = recs.filter(r => r.status===col.key).length;
    hdrHtml += `<div class="kh-status-cell">
      <span class="kh-status-title ${col.cls}">${col.label}</span>
      <span class="kh-count">${cntVal}</span>
    </div>`;
  }
  $hdr.innerHTML = hdrHtml;
  $wrap.appendChild($hdr);

  const $body = dl('kanban-body');

  if (sorted.length === 0) {
    const e = dl(''); e.style.cssText = 'padding:2rem 1.5rem;font-size:.85rem;color:var(--ink-4);';
    e.textContent = 'No tasks match the current filter.';
    $body.appendChild(e);
  }

  // Card height estimate for calculating overflow
  const CARD_H = 76; // px approx
  const MAX_H  = 200;
  const mkCell = (tasks, bg, colKey) => {
    const $cell = dl('swim-cell');
    if (bg) $cell.style.background = bg;
    if (tasks.length === 0) {
      $cell.classList.add('col-empty');
      const e = dl('swim-empty'); e.textContent = '—'; $cell.appendChild(e);
    } else {
      const sorted = byPri(tasks);
      sorted.forEach(r => $cell.appendChild(buildCard(r)));
      // Estimated overflow badge
      const visible = Math.max(1, Math.floor(MAX_H / CARD_H));
      if (sorted.length > visible) {
        const over = sorted.length - visible;
        const $more = document.createElement('button');
        $more.className = 'more-badge';
        $more.textContent = `+ ${over} more — hover to expand`;
        $more.addEventListener('click', e => {
          e.stopPropagation();
          $cell.style.maxHeight = $cell.style.maxHeight === '800px' ? '' : '800px';
          $more.textContent = $cell.style.maxHeight ? '▲ collapse' : `+ ${over} more — hover to expand`;
        });
        $cell.appendChild($more);
      }
    }
    return $cell;
  };

  for (const [name, buckets] of sorted) {
    const disp  = name || 'Unassigned';
    const color = name ? avColor(name) : 'oklch(68% .01 82)';
    const actv  = buckets.wip.length;
    const total = Object.values(buckets).flat().length;
    const row   = dl('swim-row');
    row.style.gridTemplateColumns = gridTpl;

    const $person = dl('swim-person');
    $person.innerHTML = `
      <div class="av" style="background:${color};width:24px;height:24px;font-size:.57rem">${esc(initials(disp))}</div>
      <div class="swim-person-info">
        <div class="swim-pname">${esc(disp)}</div>
        <div class="swim-pstats">
          ${actv ? `<span style="color:var(--wip);font-weight:500">${actv} active</span> · ` : ''}
          ${buckets.open.length} open · ${total} total
        </div>
      </div>
      <button class="row-toggle" title="Collapse/expand row">▼</button>`;

    // Collapse toggle
    $person.querySelector('.row-toggle').addEventListener('click', () => {
      row.classList.toggle('row-collapsed');
    });
    row.appendChild($person);

    for (const col of cols) {
      row.appendChild(mkCell(buckets[col.bucket], col.bg));
    }

    $body.appendChild(row);
  }

  $wrap.appendChild($body);
  $ca.appendChild($wrap);
}

/* ── By Person ── */
function renderByPerson($ca){
  const $sv=dl('scroll-view');
  const amap=new Map();
  for(const r of state.records){
    const a=r.assignee?.trim()||'';
    if(!amap.has(a))amap.set(a,[]);
    amap.get(a).push(r);
  }
  const sorted=[...amap.entries()].sort((a,b)=>!a[0]?1:!b[0]?-1:(b[1].filter(r=>r.status==='open').length)-(a[1].filter(r=>r.status==='open').length)||a[0].localeCompare(b[0]));
  for(const[name,tasks]of sorted){
    const disp=name||'Unassigned';const color=name?avColor(name):'oklch(68% .01 82)';
    const openCnt=tasks.filter(r=>r.status==='open').length;
    const $sec=dl('person-section');
    const $hdr=dl('ps-header');
    $hdr.innerHTML=`<div class="av" style="background:${color};width:28px;height:28px;font-size:.68rem">${esc(initials(disp))}</div>
      <span class="ps-name">${esc(disp)}</span>
      <span class="ps-stats">${openCnt} open · ${tasks.length} total</span>`;
    $sec.appendChild($hdr);
    const $tasks=dl('ps-tasks');
    [...tasks].sort((a,b)=>(a.status==='open'?0:1)-(b.status==='open'?0:1)||(a.priority??99)-(b.priority??99)).forEach(r=>$tasks.appendChild(buildCard(r)));
    $sec.appendChild($tasks);$sv.appendChild($sec);
  }
  if(!amap.size){const e=dl('');e.style.cssText='padding:2rem 1.5rem;color:var(--ink-4);';e.textContent='No tasks.';$sv.appendChild(e);}
  $ca.appendChild($sv);
}

/* ── Dep tree ── */
function renderDepView($ca){
  const $sv=dl('scroll-view');
  const{roots}=state.depTree;
  if(!roots.length){const e=dl('');e.style.cssText='padding:2rem 1.5rem;color:var(--ink-4);';e.textContent='No tasks.';$sv.appendChild(e);}
  else roots.forEach(n=>$sv.appendChild(depNode(n)));
  $ca.appendChild($sv);
}
function depNode(n){
  if(n.type==='ref'){const d=dl('ref-node');d.innerHTML=`<span>↳ ref</span><span>${esc(n.rec.title)}</span><span class="ref-id">${esc(n.id)}</span>`;return d;}
  if(n.type==='cycle'){const d=dl('ref-node');d.innerHTML=`<span>⟳</span><span>${esc(n.rec.title)}</span><span class="ref-id">${esc(n.id)}</span>`;return d;}
  const w=dl('tree-node');
  w.appendChild(buildCard(n.rec,n.children.length>0));
  if(n.children.length){const ch=dl('tree-children');n.children.forEach(c=>ch.appendChild(depNode(c)));w.appendChild(ch);}
  return w;
}

/* ── Grouped ── */
function renderGroupView($ca){
  const $sv=dl('scroll-view');
  const{sections,nodeWarns}=state.groupedTree;
  for(const sec of sections){
    const $sec=dl('group-section');
    const $hdr=dl('group-header');
    $hdr.innerHTML=`<span class="group-title">${esc(sec.title)}</span><span class="group-count">${sec.nodes.length}</span><span class="gchev open">▲</span>`;
    const $body=dl('group-body');
    const ids=new Set(sec.nodes.map(n=>n.id));
    const cm=new Map(sec.nodes.map(n=>[n.id,[]]));const top=[];
    for(const r of sec.nodes){if(r.parentId&&ids.has(r.parentId))cm.get(r.parentId).push(r);else top.push(r);}
    function gNode(r,depth){
      const w=dl('tree-node');if(depth>0)w.style.marginLeft=(depth*1.25)+'rem';
      const wn=nodeWarns.get(r.id)||[];
      w.appendChild(buildCard(r,cm.get(r.id).length>0,wn));
      cm.get(r.id).forEach(c=>$body.appendChild(gNode(c,depth+1)));return w;
    }
    top.forEach(r=>$body.appendChild(gNode(r,0)));
    $hdr.addEventListener('click',()=>{$body.classList.toggle('collapsed');$hdr.querySelector('.gchev').classList.toggle('open');});
    $sec.appendChild($hdr);$sec.appendChild($body);$sv.appendChild($sec);
  }
  if(!sections.length){const e=dl('');e.style.cssText='padding:2rem 1.5rem;color:var(--ink-4);';e.textContent='No tasks.';$sv.appendChild(e);}
  $ca.appendChild($sv);
}

/* ── Card builder ── */
function buildCard(r, hasChildren=false, extraWarns=[]) {
  const card=dl(`task-card status-${r.status||'other'}`);
  const PM={0:'Critical',1:'High',2:'Medium',3:'Low',4:'Backlog'};
  const PC={0:'b-p0',1:'b-p1',2:'b-p2',3:'b-type',4:'b-type'};
  const desc=(r.description||'').trim();
  const trunc=desc.length>MAX_DESC?desc.slice(0,MAX_DESC)+'…':desc;
  const ac=r.assignee?avColor(r.assignee):'var(--ink-4)';

  card.innerHTML=`
    <div style="display:flex;align-items:flex-start;gap:.45rem">
      ${hasChildren?`<button class="ctog open">▶</button>`:''}
      <div style="flex:1;min-width:0">
        <div class="card-title">${esc(r.title)}</div>
        <div class="card-id">${esc(r.id)}</div>
      </div>
      ${r.assignee?`<div class="av" style="background:${ac};width:20px;height:20px;font-size:.5rem;flex-shrink:0;margin-top:1px" title="${esc(r.assignee)}">${esc(initials(r.assignee))}</div>`:''}
    </div>
    <div class="card-badges">
      <span class="badge ${{open:'b-open',in_progress:'b-wip',blocked:'b-blocked',deferred:'b-deferred',closed:'b-done'}[r.status]||'b-type'}">${{open:'Open',in_progress:'In Progress',blocked:'Blocked',deferred:'Deferred',closed:'Done'}[r.status]||esc(r.status||'?')}</span>
      ${r.priority!=null?`<span class="badge ${PC[r.priority]||'b-type'}">P${r.priority} ${PM[r.priority]||''}</span>`:''}
      ${r.type?`<span class="badge b-type">${esc(r.type)}</span>`:''}
      ${extraWarns.map(w=>`<span class="badge" style="background:var(--warn-bg,oklch(96% .05 65));color:oklch(36% .13 58)">${esc(w.code)}</span>`).join('')}
    </div>
    ${r.dependsOnIds.length?`<div class="card-deps"><span class="dep-label">blocked by</span>${r.dependsOnIds.map(id=>`<span class="dep-chip">${esc(id)}</span>`).join('')}</div>`:''}
    ${desc?`<div class="card-desc">${esc(trunc)}</div>`:''}`;

  const tog=card.querySelector('.ctog');
  if(tog&&hasChildren)tog.addEventListener('click',e=>{
    e.stopPropagation();
    const ch=card.parentElement?.querySelector('.tree-children');
    if(ch){ch.classList.toggle('collapsed');tog.classList.toggle('open');}
  });
  card.addEventListener('click',e=>{
    if(e.target.closest('.ctog'))return;
    const d=card.querySelector('.card-desc');if(d)d.classList.toggle('open');
  });
  return card;
}

/* ── Error state ── */
function showErr(title,msg){
  setLoading(false);
  const $ca=document.getElementById('content-area');
  $ca.innerHTML=`<div class="state-panel"><div class="state-icon">⚠</div><div class="state-title">${esc(title)}</div><div class="state-body">${esc(msg)}</div></div>`;
}

/* ── Helpers ── */
function dl(cls){const e=document.createElement('div');if(cls)e.className=cls;return e;}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
</script>

# Formula: mol-c4flow-task
# Type: workflow
# Purpose: Standard c4flow task with quality gate steps
#
# Usage:
#   bd mol pour mol-c4flow-task --var task_name="implement auth"
#   bd cook mol-c4flow-task --dry-run   (preview steps without creating beads)
#
# Gate behavior:
#   The review-gate and verify-gate steps are blocking workflow steps. Advancement
#   to the next step requires the c4flow skill to resolve the beads gate:
#     - review-gate: blocked until `c4flow:review` runs and resolves the gate bead
#     - verify-gate: blocked until `c4flow:verify` runs and all checks pass
#
# Schema note: Beads workflow formula steps do not have a native "gate" type in the
# TOML schema (Step struct has: id, title, description, needs, parallel, acceptance).
# Gates are created dynamically by c4flow:review and c4flow:verify skills using
# `bd gate resolve <gate_id>`. The steps below use descriptive titles and acceptance
# criteria to communicate the gate contract to both agents and humans.
#
# INFR-05 requirement: "A beads molecule formula template exists with explicit review
# and verify gate steps" — satisfied by named steps whose acceptance criteria require
# gate resolution before advancement.

description = """Standard c4flow task with quality gates.

Pour this formula to create a task molecule with three sequential steps:
  1. implement — the actual implementation work
  2. review-gate — blocks until `c4flow:review` resolves the quality gate
  3. verify-gate — blocks until `c4flow:verify` confirms all checks pass

The review and verify steps act as gates: the c4flow skills create a beads gate
bead at review time and resolve it when all checks pass. The next step cannot start
until the prior gate is resolved.

Usage:
  bd mol pour mol-c4flow-task --var task_name="implement auth"

Requires:
  - c4flow:review skill (Codex review + gate creation/resolution)
  - c4flow:verify skill (bd preflight + gate status aggregation)
"""
formula = "mol-c4flow-task"
type = "workflow"
version = 1

# Step 1: Implementation work
[[steps]]
id = "implement"
title = "Implement: {{task_name}}"
description = """
Implement the feature or fix described by: **{{task_name}}**

This is the main implementation step. Work through the requirements, write code,
add tests, and commit your changes.

**Exit criteria:**
- Code changes committed
- Tests passing locally
- Ready for automated quality review

When complete, run `c4flow:review` to trigger the quality gate.
"""

# Step 2: Quality gate — Codex review
[[steps]]
id = "review-gate"
title = "Quality gate: Codex review"
needs = ["implement"]
acceptance = "c4flow:review has resolved the quality gate bead (overall_pass includes codex_review.pass == true)"
description = """
**GATE STEP: This step requires `c4flow:review` to run and resolve.**

Run the automated Codex code review and resolve the quality gate.

**How this gate works:**
1. Run `/c4flow:review` in your Claude Code session
2. The skill dispatches a Codex subagent to review `git diff main`
3. Results are written to `quality-gate-status.json`
4. If CRITICAL or HIGH issues are found: gate stays blocked, fix and re-run
5. If only MEDIUM/LOW findings: gate resolves automatically

**To unblock this step:**
```bash
# Run c4flow:review skill
/c4flow:review
```

**Gate resolution:**
The `c4flow:review` skill calls `bd gate resolve <gate_id> --reason "..."` when
all blocking checks pass. This step cannot proceed until that call succeeds.

**Manual bypass (emergency only):**
```bash
# Only use if automated review is unavailable — requires justification
bd gate resolve <gate_id> --reason "Manual review: <your reasoning>"
```

**Exit criteria:**
- `quality-gate-status.json` exists with `codex_review.pass == true`
- Quality gate bead has been resolved by c4flow:review
- No CRITICAL or HIGH findings remain unaddressed
"""

# Step 3: Quality gate — bd preflight verification
[[steps]]
id = "verify-gate"
title = "Quality gate: bd preflight"
needs = ["review-gate"]
acceptance = "c4flow:verify declares Ready for PR: YES (overall_pass == true in quality-gate-status.json)"
description = """
**GATE STEP: This step requires `c4flow:verify` to run and confirm all checks pass.**

Run the full quality gate aggregation and verify readiness for PR.

**How this gate works:**
1. Run `/c4flow:verify` in your Claude Code session
2. The skill reads `quality-gate-status.json` (from review-gate step)
3. Runs `bd preflight --check --json` and writes results
4. Checks expiry: if results are older than C4FLOW_GATE_EXPIRY_MINUTES, re-run review
5. Declares "Ready for PR: YES" only when ALL checks pass (Codex + preflight)

**To unblock this step:**
```bash
# Run c4flow:verify skill
/c4flow:verify
```

**Gate resolution:**
The `c4flow:verify` skill resolves the gate bead when `overall_pass == true`.
It also prints the `bd close --reason` command with full audit context.

**Exit criteria:**
- `quality-gate-status.json` has `overall_pass == true`
- Both `codex_review.pass == true` AND `bd_preflight.pass == true`
- Skill output shows "Ready for PR: YES"
- Gate bead resolved with audit trail
"""

# Variables
[vars]
[vars.task_name]
description = "Name of the task being implemented (used in step titles and descriptions)"
required = true
